<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7f3ee">
<title>Meal Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f7f3ee;--cream2:#ede8e1;--cream3:#e2dbd2;
  --green:#3a6b4a;--green-light:#eaf1ec;
  --amber:#c8873a;--amber-light:#fdf0e3;
  --red-light:#fdecea;--red:#c0504a;
  --blue-light:#e8f0fb;--blue:#3a5fa0;
  --purple-light:#eeedfe;--purple:#3c3489;
  --teal-light:#e1f5ee;--teal:#0f6e56;
  --text:#2a2520;--text2:#6b5f55;--text3:#9c8f84;
  --border:rgba(42,37,32,0.1);--shadow:0 2px 12px rgba(42,37,32,0.08);
  --r:12px;--rl:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--cream);}
body{font-family:'DM Sans',sans-serif;color:var(--text);max-width:430px;margin:0 auto;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;border:none;background:none;transition:color .15s;}
.nav-btn.active{color:var(--green);}
.nav-icon{font-size:19px;line-height:1;}

/* SCREENS */
.screen{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(100% - 56px);overflow-y:auto;padding:0 0 24px;display:none;background:var(--cream);}
.screen.active{display:block;}

/* EDIT TOGGLE */
.edit-toggle-bar{display:flex;align-items:center;justify-content:flex-end;padding:8px 20px 0;}
.edit-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);background:none;border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-family:'DM Sans',sans-serif;}
.edit-toggle.active{color:var(--amber);border-color:var(--amber);background:var(--amber-light);}
.toggle-dot{width:5px;height:5px;border-radius:50%;background:var(--cream3);}
.edit-toggle.active .toggle-dot{background:var(--amber);}

/* HOME */
.home-header{padding:44px 20px 20px;background:var(--green);position:relative;overflow:hidden;}
.home-header::after{content:'';position:absolute;bottom:-30px;left:-20px;right:-20px;height:60px;background:var(--cream);border-radius:50% 50% 0 0/30px 30px 0 0;}
.home-greeting{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:3px;letter-spacing:.04em;}
.home-title{font-family:'Playfair Display',serif;font-size:26px;color:#fff;font-weight:500;line-height:1.2;}
.week-badge-home{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 11px;font-size:12px;color:rgba(255,255,255,.9);font-weight:500;}
.home-body{padding:32px 20px 0;}
.section-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}

/* PLAN WINDOW CARD */
.plan-window-card{background:#fff;border-radius:var(--rl);border:1px solid var(--border);padding:13px 15px;box-shadow:var(--shadow);margin-bottom:14px;}
.pw-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
.pw-title{font-size:13px;font-weight:500;color:var(--text);}
.pw-range{font-size:12px;color:var(--text3);margin-top:1px;}
.pw-edit-btn{font-size:12px;font-weight:500;color:var(--amber);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.pw-days-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.pw-days-row::-webkit-scrollbar{display:none;}
.pw-day-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 9px;border-radius:10px;border:1px solid var(--border);background:var(--cream);cursor:pointer;min-width:42px;}
.pw-day-pill.today{border-color:var(--green);background:var(--green-light);}
.pw-day-pill.weekend{background:var(--cream2);}
.pw-day-pill.today .pw-pill-dow,.pw-day-pill.today .pw-pill-num{color:var(--green);}
.pw-pill-dow{font-size:9px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.pw-pill-num{font-size:14px;font-weight:500;color:var(--text2);}
.pw-pill-dots{display:flex;gap:2px;}
.pw-dot{width:4px;height:4px;border-radius:50%;}
.pw-pill-out{font-size:9px;color:var(--text3);font-style:italic;}

/* TODAY CARD */
.today-card{background:#fff;border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.today-day-label{padding:13px 15px 0;font-size:13px;font-weight:500;color:var(--text2);}
.meal-row{display:flex;align-items:center;gap:10px;padding:10px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.meal-row:last-child{border-bottom:none;}
.meal-row:active{background:var(--cream);}
.meal-type-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.meal-row-content{flex:1;min-width:0;}
.meal-row-type{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.meal-row-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.meal-row-tag{font-size:10px;font-weight:500;padding:2px 6px;border-radius:10px;flex-shrink:0;}
.tag-prepped{background:var(--green-light);color:var(--green);}
.tag-cook{background:var(--amber-light);color:var(--amber);}
.tag-salmon{background:var(--red-light);color:var(--red);}
.tag-chicken{background:var(--amber-light);color:var(--amber);}
.tag-shrimp{background:var(--blue-light);color:var(--blue);}
.tag-custom{background:var(--teal-light);color:var(--teal);}
.tag-out{background:var(--cream2);color:var(--text3);}
.open-icon,.edit-icon{font-size:13px;color:var(--text3);flex-shrink:0;}
.edit-icon{color:var(--amber);}

/* WEEK SWITCHER */
.week-switcher{margin-top:14px;background:#fff;border-radius:var(--rl);border:1px solid var(--border);padding:13px 15px;box-shadow:var(--shadow);}
.ws-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.ws-title-wrap{flex:1;}
.ws-title{font-size:13px;font-weight:500;color:var(--text);}
.ws-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.ws-title-input{font-size:13px;font-weight:500;color:var(--text);border:none;border-bottom:1px solid var(--amber);background:transparent;font-family:'DM Sans',sans-serif;width:100%;outline:none;padding:2px 0;}
.ws-sub-input{font-size:12px;color:var(--text2);border:none;border-bottom:1px dashed var(--cream3);background:transparent;font-family:'DM Sans',sans-serif;width:100%;outline:none;padding:2px 0;margin-top:3px;}
.ws-next-btn{background:var(--green);color:#fff;border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;margin-left:10px;}
.week-dots{display:flex;gap:5px;}
.week-pip{width:7px;height:7px;border-radius:50%;background:var(--cream3);transition:background .2s;}
.week-pip.active{background:var(--green);}
.prep-reminder{margin-top:12px;background:var(--purple-light);border-radius:var(--r);padding:10px 13px;display:none;gap:9px;align-items:flex-start;}
.prep-reminder.show{display:flex;}
.prep-text{font-size:13px;color:var(--purple);line-height:1.4;}
.prep-text strong{font-weight:500;}

/* DATE EDITOR */
.date-editor{background:#fff;border-radius:var(--rl);border:1px solid var(--amber);padding:13px 15px;box-shadow:var(--shadow);margin-bottom:14px;}
.de-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:11px;}
.de-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.de-label{font-size:12px;color:var(--text3);width:60px;flex-shrink:0;}
.de-input{flex:1;font-size:13px;color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-family:'DM Sans',sans-serif;background:#fff;outline:none;}
.de-input:focus{border-color:var(--green);}
.de-actions{display:flex;gap:8px;margin-top:4px;}
.de-btn{flex:1;padding:9px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);}
.de-btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
.de-btn.secondary{background:#fff;color:var(--text2);}

/* PLAN SCREEN (list + calendar toggle) */
.plan-header{padding:44px 20px 8px;}
.plan-header-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:var(--text);}
.plan-header-sub{font-size:13px;color:var(--text3);margin-top:3px;}
.view-toggle{display:flex;gap:6px;padding:10px 20px 4px;}
.vt-btn{flex:1;padding:8px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:#fff;color:var(--text2);transition:all .15s;}
.vt-btn.active{background:var(--green);color:#fff;border-color:var(--green);}

/* LIST VIEW */
.day-tabs{display:flex;gap:5px;padding:10px 20px 12px;overflow-x:auto;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 11px;border-radius:var(--r);border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;min-width:48px;}
.day-tab.active{background:var(--green);border-color:var(--green);}
.day-tab.is-today:not(.active){border-color:var(--green);}
.day-tab.is-weekend{background:var(--cream2);}
.day-tab.active .day-tab-dow,.day-tab.active .day-tab-date{color:rgba(255,255,255,.9);}
.day-tab-dow{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.day-tab.is-today:not(.active) .day-tab-dow{color:var(--green);}
.day-tab-date{font-size:15px;font-weight:500;color:var(--text);}
.day-detail{padding:0 20px;}
.day-detail-card{background:#fff;border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.recipe-link-row{display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;text-decoration:none;transition:background .1s;}
.recipe-link-row:last-child{border-bottom:none;}
.recipe-link-row:active{background:var(--cream);}
.rr-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.b-icon{background:var(--cream2);}
.l-icon-p{background:var(--green-light);}
.l-icon-c{background:var(--amber-light);}
.d-icon-c{background:var(--amber-light);}
.d-icon-s{background:var(--red-light);}
.d-icon-sh{background:var(--blue-light);}
.d-icon-cu{background:var(--teal-light);}
.out-icon{background:var(--cream2);}
.rr-body{flex:1;min-width:0;}
.rr-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.rr-name{font-size:13px;color:var(--text);margin-top:1px;line-height:1.3;}
.rr-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.rr-arrow{font-size:13px;color:var(--text3);flex-shrink:0;}
.prep-night-banner{margin:10px 0 0;background:var(--purple-light);border-radius:var(--r);padding:9px 13px;font-size:13px;color:var(--purple);line-height:1.4;}
.prep-night-banner strong{font-weight:500;}
.edit-meal-row{display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid var(--border);background:var(--amber-light);}
.edit-meal-row:last-child{border-bottom:none;}
.edit-rr-label{font-size:10px;font-weight:500;color:var(--amber);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.edit-save-btn{background:var(--amber);color:#fff;border:none;border-radius:8px;padding:5px 9px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.no-plan-msg{padding:30px 20px;text-align:center;font-size:13px;color:var(--text3);line-height:1.6;}

/* CALENDAR VIEW */
.cal-wrap{padding:0 20px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px;}
.cal-month{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;color:var(--text);}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.cal-dow{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;text-align:center;padding:3px 0;}
.cal-dow.weekend-col{color:var(--amber);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{border-radius:8px;padding:5px 4px;min-height:56px;background:#fff;border:1px solid var(--border);position:relative;cursor:pointer;transition:border-color .12s;}
.cal-cell:active{background:var(--cream);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-cell.today{border:1.5px solid var(--green);}
.cal-cell.in-plan{background:#fff;}
.cal-cell.weekend-cell{background:var(--cream2);}
.cal-cell.out-day{opacity:.6;}
.cal-cell.active-cell{border:1.5px solid var(--amber);}
.cal-num{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:3px;}
.cal-cell.today .cal-num{color:var(--green);}
.cal-dots{display:flex;flex-direction:column;gap:2px;}
.cal-dot-row{display:flex;gap:2px;align-items:center;}
.cal-dot{width:4px;height:4px;border-radius:50%;}
.cal-meal-name{font-size:8px;color:var(--text3);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:2px;}
.cal-out-label{font-size:8px;color:var(--text3);font-style:italic;margin-top:2px;}
.cal-detail-panel{background:var(--cream);border-top:1px solid var(--border);padding:14px 20px;display:none;margin-top:10px;}
.cal-detail-panel.show{display:block;}
.cal-detail-date{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}

/* GROCERY */
.grocery-header{padding:44px 20px 8px;}
.grocery-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:var(--text);}
.grocery-sub{font-size:13px;color:var(--text3);margin-top:3px;}
.grocery-actions{display:flex;gap:7px;padding:11px 20px 9px;}
.g-btn{flex:1;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.g-btn:active{background:var(--cream2);}
.g-btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
.grocery-section{padding:0 20px 13px;}
.grocery-section-hd{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;padding:0 2px;}
.grocery-list{background:#fff;border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.grocery-item{display:flex;align-items:flex-start;gap:11px;padding:11px 15px;border-bottom:1px solid var(--border);}
.grocery-item:last-child{border-bottom:none;}
.grocery-item-cz{display:flex;align-items:flex-start;gap:11px;flex:1;cursor:pointer;}
.grocery-item-cz:active{opacity:.7;}
.grocery-check{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--cream3);background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;}
.grocery-check.checked{background:var(--green);border-color:var(--green);}
.check-mark{color:#fff;font-size:11px;opacity:0;transition:opacity .1s;}
.grocery-check.checked .check-mark{opacity:1;}
.grocery-item.checked-item .grocery-item-text{color:var(--text3);text-decoration:line-through;}
.grocery-item-tw{flex:1;}
.grocery-item-text{font-size:14px;color:var(--text);line-height:1.3;}
.grocery-item-note{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.3;}
.grocery-item-name-input,.grocery-item-note-input{width:100%;border:none;background:transparent;font-family:'DM Sans',sans-serif;outline:none;}
.grocery-item-name-input{font-size:14px;color:var(--text);border-bottom:1px solid var(--amber);padding:1px 0;}
.grocery-item-note-input{font-size:11px;color:var(--text2);border-bottom:1px dashed var(--cream3);padding:2px 0;margin-top:3px;}
.delete-item-btn{font-size:15px;color:var(--text3);cursor:pointer;flex-shrink:0;background:none;border:none;margin-top:1px;}
.delete-item-btn:active{color:var(--red);}
.add-item-row{display:flex;gap:7px;padding:9px 15px;border-top:1px solid var(--border);background:var(--cream);}
.add-item-input{flex:1;font-size:13px;color:var(--text);border:none;border-bottom:1px solid var(--amber);background:transparent;font-family:'DM Sans',sans-serif;outline:none;padding:3px 0;}
.add-item-submit{background:var(--amber);color:#fff;border:none;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.progress-bar-wrap{margin:0 20px 5px;background:var(--cream2);border-radius:10px;height:5px;overflow:hidden;}
.progress-bar{height:100%;background:var(--green);border-radius:10px;transition:width .3s;}
.progress-label{padding:0 20px 9px;font-size:12px;color:var(--text3);}
.progress-label span{color:var(--green);font-weight:500;}

/* RECIPES SCREEN */
.recipes-header{padding:44px 20px 8px;}
.recipes-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:var(--text);}
.recipes-sub{font-size:13px;color:var(--text3);margin-top:3px;}
.recipes-filter-row{display:flex;gap:6px;padding:10px 20px 6px;overflow-x:auto;scrollbar-width:none;}
.recipes-filter-row::-webkit-scrollbar{display:none;}
.filter-pill{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .15s;}
.filter-pill.active{background:var(--green);color:#fff;border-color:var(--green);}
.add-recipe-btn{margin:0 20px 12px;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green);color:#fff;border:none;border-radius:var(--rl);padding:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:calc(100% - 40px);}
.recipe-cards{padding:0 20px;}
.recipe-card{background:#fff;border-radius:var(--rl);border:1px solid var(--border);padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow);}
.rc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.rc-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.rc-body{flex:1;min-width:0;}
.rc-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;}
.rc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.rc-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;}
.rc-meta{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.4;}
.rc-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.rc-link{flex:1;text-align:center;font-size:12px;font-weight:500;color:var(--blue);background:var(--blue-light);border:none;border-radius:8px;padding:7px;cursor:pointer;text-decoration:none;display:block;font-family:'DM Sans',sans-serif;}
.rc-delete{font-size:12px;font-weight:500;color:var(--text3);background:var(--cream2);border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ADD RECIPE FORM */
.add-recipe-form{background:#fff;border-radius:var(--rl);border:1px solid var(--amber);padding:14px 15px;margin:0 20px 14px;box-shadow:var(--shadow);}
.arf-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:12px;}
.arf-row{margin-bottom:10px;}
.arf-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.arf-input,.arf-select,.arf-textarea{width:100%;font-size:13px;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;background:#fff;outline:none;}
.arf-input:focus,.arf-select:focus{border-color:var(--green);}
.arf-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.arf-actions{display:flex;gap:8px;margin-top:4px;}
.arf-btn{flex:1;padding:9px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);}
.arf-btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
.arf-btn.secondary{background:#fff;color:var(--text2);}
.arf-note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5;padding:8px 10px;background:var(--teal-light);border-radius:8px;color:var(--teal);}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(42,37,32,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal{background:#fff;border-radius:var(--rl) var(--rl) 0 0;padding:18px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto;}
.modal-handle{width:34px;height:4px;background:var(--cream3);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;color:var(--text);margin-bottom:12px;}
.modal-option{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.modal-option:last-child{border-bottom:none;}
.modal-option:active{opacity:.7;}
.mo-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.mo-name{font-size:13px;color:var(--text);}
.mo-meta{font-size:11px;color:var(--text3);margin-top:1px;}
.mo-check{font-size:13px;color:var(--green);margin-left:auto;opacity:0;}
.mo-check.visible{opacity:1;}
.mo-custom-badge{font-size:9px;font-weight:500;background:var(--teal-light);color:var(--teal);padding:1px 5px;border-radius:6px;margin-left:5px;}
.modal-cancel{width:100%;padding:11px;background:var(--cream2);border:none;border-radius:var(--r);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:12px;}

// ─── MEAL HELPERS ────────────────────────────────────────────────
function getAllMeals(){
  const all={};
  Object.values(BUILTIN_MEALS).forEach(m=>{if(!m.hidden) all[m.id]=m;});
  customRecipes.forEach(r=>{all[r.id]=r;});
  return all;
}
function getMeal(id){return getAllMeals()[id]||null;}
function getMealIngredients(id){return MEAL_INGREDIENTS[id]||[];}

function getDotColor(meal){
  if(!meal) return '#ccc';
  if(meal.type==='breakfast') return '#c8a96e';
  if(meal.type==='lunch') return meal.prep?'#3a6b4a':'#c8873a';
  if(meal.ptype==='salmon') return '#c0504a';
  if(meal.ptype==='shrimp') return '#3a5fa0';
  if(meal.isCustom) return '#0f6e56';
  return '#c8873a';
}
function getEmoji(meal){
  if(!meal) return '?';
  if(meal.type==='breakfast') return '🥣';
  if(meal.type==='lunch') return meal.prep?'❄️':'🔥';
  if(meal.ptype==='salmon') return '🐟';
  if(meal.ptype==='shrimp') return '🦐';
  if(meal.isCustom) return '⭐';
  return '🍗';
}
function getIconCls(meal){
  if(!meal) return 'b-icon';
  if(meal.type==='breakfast') return 'b-icon';
  if(meal.type==='lunch') return meal.prep?'l-icon-p':'l-icon-c';
  if(meal.ptype==='salmon') return 'd-icon-s';
  if(meal.ptype==='shrimp') return 'd-icon-sh';
  if(meal.isCustom) return 'd-icon-cu';
  return 'd-icon-c';
}
function lunchTag(lPrep){return lPrep?'<span class="meal-row-tag tag-prepped">prepped</span>':'<span class="meal-row-tag tag-cook">cook</span>';}
function dinnerTag(meal){
  if(!meal) return '';
  if(meal.isCustom) return '<span class="meal-row-tag tag-custom">custom</span>';
  if(meal.ptype==='salmon') return '<span class="meal-row-tag tag-salmon">salmon</span>';
  if(meal.ptype==='shrimp') return '<span class="meal-row-tag tag-shrimp">shrimp</span>';
  return '<span class="meal-row-tag tag-chicken">chicken</span>';
}

// ─── DATE HELPERS ────────────────────────────────────────────────
function dateStr(d){return d.toISOString().slice(0,10);}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function today(){return dateStr(new Date());}
function isToday(s){return s===today();}
function isWeekend(s){const d=parseDate(s).getDay();return d===0||d===6;}
function formatShort(s){const d=parseDate(s);return MONTHS_SHORT[d.getMonth()]+' '+d.getDate();}
function formatFull(s){const d=parseDate(s);return DOW[d.getDay()]+', '+MONTHS_SHORT[d.getMonth()]+' '+d.getDate();}

// ─── PLAN BUILDING ───────────────────────────────────────────────
function buildPlan(startStr,endStr,weekType){
  const days=[];
  let cur=parseDate(startStr);
  const end=parseDate(endStr);
  while(cur<=end){
    const ds=dateStr(cur);
    const dow=cur.getDay();
    const pi=((dow-1)+7)%7;
    const pat=WEEK_PATTERNS[weekType][pi];
    const wknd=dow===0||dow===6;
    days.push({date:ds,b:pat.b,l:pat.l,lPrep:pat.lPrep,d:pat.d,isOut:false,skipLunch:wknd,skipDinner:false});
    cur=addDays(cur,1);
  }
  return{startDate:startStr,endDate:endStr,weekType,days};
}

function initPlanIfNeeded(){
  if(!plan){
    plan=buildPlan(today(),dateStr(addDays(new Date(),4)),currentWeek);
    save();
  }
}

// ─── GROCERY ────────────────────────────────────────────────────
function derivedGroceryList(){
  const mealIds=new Set();
  (plan?.days||[]).forEach(day=>{
    if(day.isOut) return;
    mealIds.add(day.b);
    if(!day.skipLunch) mealIds.add(day.l);
    if(!day.skipDinner) mealIds.add(day.d);
  });
  const seen=new Map();
  mealIds.forEach(id=>{getMealIngredients(id).forEach(ing=>{if(!seen.has(ing.i)) seen.set(ing.i,ing);});});
  // custom recipe ingredients
  mealIds.forEach(id=>{
    const m=getMeal(id);
    if(m&&m.isCustom&&m.ingredients){m.ingredients.forEach(ing=>{if(!seen.has(ing.i)) seen.set(ing.i,ing);});}
  });
  const sections={};
  seen.forEach(ing=>{if(!sections[ing.s]) sections[ing.s]=[];sections[ing.s].push({item:ing.i,note:ing.n});});
  const cKey=currentWeek+'_custom';
  if(customGrocery[cKey]&&customGrocery[cKey].length){
    if(!sections['My additions']) sections['My additions']=[];
    customGrocery[cKey].forEach(ci=>sections['My additions'].push({item:ci.item,note:ci.note||''}));
  }
  return sections;
}

      <div class="edit-meal-row">
        <div class="rr-icon ${getIconCls(r.meal)}">${getEmoji(r.meal)}</div>
        <div style="flex:1;min-width:0"><div class="edit-rr-label">${r.label}</div><div style="font-size:13px;color:var(--text)">${r.meal.name}</div></div>
        <button class="edit-save-btn" onclick="openSwapModal(${idx},'${r.slot}')">Swap</button>
      </div>`).join('');
    const weekendCtrls=wknd?`<div style="display:flex;gap:6px;margin-top:8px">
      <button onclick="toggleSkipLunch(${idx})" style="flex:1;padding:8px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:${dp.skipLunch?'var(--amber)':'#fff'};color:${dp.skipLunch?'#fff':'var(--text2)'}">
        ${dp.skipLunch?'Lunch skipped ✓':'Skip lunch'}
      </button>
      <button onclick="toggleSkipDinner(${idx})" style="flex:1;padding:8px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:${dp.skipDinner?'var(--amber)':'#fff'};color:${dp.skipDinner?'#fff':'var(--text2)'}">
        ${dp.skipDinner?'Dinner skipped ✓':'Skip dinner'}
      </button>
    </div>
    <button onclick="toggleDayOut(${idx})" style="margin-top:6px;width:100%;padding:8px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:#fff;color:var(--text2)">Mark whole day as eating out</button>`:
    `<button onclick="toggleDayOut(${idx})" style="margin-top:8px;width:100%;padding:8px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:#fff;color:var(--text2)">Mark as eating out</button>`;
    document.getElementById('day-detail').innerHTML=`
      <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">${dateLbl}</div>
      <div class="day-detail-card">${mealRows}</div>${weekendCtrls}${prepBanner}`;
  } else {
    const mealRows=rows.filter(Boolean).map(r=>`
      <a class="recipe-link-row" href="${r.meal.url}" target="_blank">
        <div class="rr-icon ${getIconCls(r.meal)}">${getEmoji(r.meal)}</div>
        <div class="rr-body"><div class="rr-label">${r.label}</div><div class="rr-name">${r.meal.name}</div><div class="rr-meta">${r.meal.protein||''} protein${r.meal.fiber?' · '+r.meal.fiber+' fiber':''} · ${r.meal.note||''}</div></div>
        <div class="rr-arrow">↗</div>
      </a>`).join('');
    const skippedNote=(dp.skipLunch||dp.skipDinner)?`<div style="padding:10px 15px;font-size:12px;color:var(--text3)">${[dp.skipLunch?'Lunch skipped':null,dp.skipDinner?'Dinner skipped':null].filter(Boolean).join(' · ')}</div>`:'';
    document.getElementById('day-detail').innerHTML=`
      <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">${dateLbl}</div>
      <div class="day-detail-card">${mealRows}${skippedNote}</div>${prepBanner}`;
  }
}

function toggleDayOut(idx){plan.days[idx].isOut=!plan.days[idx].isOut;save();renderDayDetail(idx);renderHome();renderCalendar();renderGrocery();}
function toggleSkipLunch(idx){plan.days[idx].skipLunch=!plan.days[idx].skipLunch;save();renderDayDetail(idx);renderHome();renderCalendar();renderGrocery();}
function toggleSkipDinner(idx){plan.days[idx].skipDinner=!plan.days[idx].skipDinner;save();renderDayDetail(idx);renderHome();renderCalendar();renderGrocery();}

// ─── CALENDAR VIEW ───────────────────────────────────────────────
function calChangeMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}

function renderCalendar(){
  document.getElementById('cal-month-label').textContent=MONTHS[calMonth]+' '+calYear;
  const firstDow=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const planMap={};
  (plan?.days||[]).forEach(day=>{planMap[day.date]=day;});

  let html='';
  for(let i=0;i<firstDow;i++) html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(calYear,calMonth,d).getDay();
    const wknd=dow===0||dow===6;
    const dp=planMap[ds];
    const isTdy=isToday(ds);
    const isActive=calActiveDate===ds;
    let inner=`<div class="cal-num">${d}</div>`;
    if(dp){
      if(dp.isOut){
        inner+=`<div class="cal-out-label">out</div>`;
      } else {
        const b=getMeal(dp.b),l=getMeal(dp.l),din=getMeal(dp.d);
        inner+=`<div class="cal-dots">`;
        if(b) inner+=`<div class="cal-dot-row"><div class="cal-dot" style="background:${getDotColor(b)}"></div><div class="cal-meal-name">${b.name.split(' ').slice(0,2).join(' ')}</div></div>`;
        if(!dp.skipLunch&&l) inner+=`<div class="cal-dot-row"><div class="cal-dot" style="background:${getDotColor(l)}"></div><div class="cal-meal-name">${l.name.split(' ').slice(0,2).join(' ')}</div></div>`;
        if(!dp.skipDinner&&din) inner+=`<div class="cal-dot-row"><div class="cal-dot" style="background:${getDotColor(din)}"></div><div class="cal-meal-name">${din.name.split(' ').slice(0,2).join(' ')}</div></div>`;
        inner+=`</div>`;
      }
    }
    const cls=['cal-cell',dp?'in-plan':'',wknd?'weekend-cell':'',isTdy?'today':'',isActive?'active-cell':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="calTapDay('${ds}')">${inner}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  if(calActiveDate) renderCalDetail(calActiveDate);
}

function calTapDay(ds){
  calActiveDate=calActiveDate===ds?null:ds;
  renderCalendar();
  if(!calActiveDate){document.getElementById('cal-detail-panel').classList.remove('show');return;}
  renderCalDetail(ds);
}

function renderCalDetail(ds){
  const dp=(plan?.days||[]).find(d=>d.date===ds);
  const panel=document.getElementById('cal-detail-panel');
  document.getElementById('cal-detail-date').textContent=formatFull(ds);
  if(!dp){document.getElementById('cal-detail-content').innerHTML=`<div style="font-size:13px;color:var(--text3)">Not in current plan.</div>`;panel.classList.add('show');return;}
  if(dp.isOut){document.getElementById('cal-detail-content').innerHTML=`<div style="font-size:13px;color:var(--text3)">Eating out — no meals planned.</div>`;panel.classList.add('show');return;}
  const rows=[];
  const b=getMeal(dp.b),l=getMeal(dp.l),d=getMeal(dp.d);
  if(b) rows.push({label:'Breakfast',meal:b});
  if(!dp.skipLunch&&l) rows.push({label:`Lunch · ${dp.lPrep?'prepped':'cook'}`,meal:l});
  if(!dp.skipDinner&&d) rows.push({label:`Dinner`,meal:d});
  document.getElementById('cal-detail-content').innerHTML=rows.map(r=>`
    <a class="recipe-link-row" href="${r.meal.url}" target="_blank" style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;text-decoration:none;">
      <div class="rr-icon ${getIconCls(r.meal)}" style="width:30px;height:30px;font-size:13px">${getEmoji(r.meal)}</div>
      <div style="flex:1;min-width:0"><div class="rr-label">${r.label}</div><div class="rr-name" style="font-size:13px">${r.meal.name}</div></div>
      <div class="rr-arrow">↗</div>
    </a>`).join('');
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ─── GROCERY ────────────────────────────────────────────────────
function renderGrocery(){
  initPlanIfNeeded();
  const s=formatShort(plan.startDate),e=formatShort(plan.endDate);
  document.getElementById('grocery-sub').textContent=(plan.startDate===plan.endDate?s:s+' – '+e)+' · trimmed to your plan';
  const sections=derivedGroceryList();
  const keys=Object.keys(sections);
  if(!keys.length){document.getElementById('grocery-sections').innerHTML=`<div style="padding:30px 20px;text-align:center;font-size:13px;color:var(--text3);line-height:1.6">No meals planned.<br>Set a window on the home screen.</div>`;return;}
  let total=0,checked=0;
  document.getElementById('grocery-sections').innerHTML=keys.map(section=>{
    const items=sections[section];total+=items.length;
    const rows=items.map((item,i)=>{
      const key=currentWeek+'_'+item.item;
      const isChk=!!checkedItems[key];if(isChk) checked++;
      if(editMode.grocery){
        return`<div class="grocery-item ${isChk?'checked-item':''}">
          <div class="grocery-item-cz" onclick="toggleItem('${key}',this.closest('.grocery-item'))">
            <div class="grocery-check ${isChk?'checked':''}"><span class="check-mark">✓</span></div>
            <div class="grocery-item-tw">
              <input class="grocery-item-name-input" value="${item.item}">
              <input class="grocery-item-note-input" value="${item.note||''}" placeholder="Note...">
            </div>
          </div>
          <button class="delete-item-btn" onclick="deleteCustomGrocery('${section}',${i})">×</button>
        </div>`;
      }
      return`<div class="grocery-item ${isChk?'checked-item':''}" onclick="toggleItem('${key}',this)">
        <div class="grocery-item-cz">
          <div class="grocery-check ${isChk?'checked':''}"><span class="check-mark">✓</span></div>
          <div class="grocery-item-tw"><div class="grocery-item-text">${item.item}</div>${item.note?`<div class="grocery-item-note">${item.note}</div>`:''}</div>
        </div>
      </div>`;
    }).join('');
    const addRow=editMode.grocery?`<div class="add-item-row"><input class="add-item-input" placeholder="Add to ${section}..." id="gadd-${section.replace(/\W/g,'_')}"><button class="add-item-submit" onclick="addCustomGrocery('${section}','gadd-${section.replace(/\W/g,'_')}')">Add</button></div>`:'';
    return`<div class="grocery-section"><div class="grocery-section-hd">${section}</div><div class="grocery-list">${rows}${addRow}</div></div>`;
  }).join('');
  const pct=total?Math.round(checked/total*100):0;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-text').textContent=checked+' of '+total;
}
function toggleItem(key,el){
  checkedItems[key]=!checkedItems[key];if(!checkedItems[key]) delete checkedItems[key];save();
  el.classList.toggle('checked-item',!!checkedItems[key]);
  el.querySelector('.grocery-check')?.classList.toggle('checked',!!checkedItems[key]);
  const sections=derivedGroceryList();let t=0,c=0;
  Object.values(sections).forEach(items=>items.forEach(({item})=>{t++;if(checkedItems[currentWeek+'_'+item])c++;}));
  const pct=t?Math.round(c/t*100):0;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-text').textContent=c+' of '+t;
}
function addCustomGrocery(section,inputId){
  const input=document.getElementById(inputId);const val=input.value.trim();if(!val) return;
  const k=currentWeek+'_custom';if(!customGrocery[k]) customGrocery[k]=[];
  customGrocery[k].push({item:val,note:''});input.value='';save();renderGrocery();
}
function deleteCustomGrocery(section,idx){
  if(section==='My additions'){const k=currentWeek+'_custom';if(customGrocery[k]){customGrocery[k].splice(idx,1);save();renderGrocery();}}
}

// ─── RECIPES SCREEN ──────────────────────────────────────────────
function setRecipeFilter(f){
  recipeFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  renderRecipes();
}

function toggleAddRecipeForm(){
  showAddRecipeForm=!showAddRecipeForm;
  renderAddRecipeForm();
}

function renderAddRecipeForm(){
  const el=document.getElementById('add-recipe-form-wrap');
  if(!showAddRecipeForm){el.innerHTML='';return;}
  el.innerHTML=`<div class="add-recipe-form">
    <div class="arf-title">Add a recipe</div>
    <div class="arf-row"><div class="arf-label">Recipe name</div><input class="arf-input" id="arf-name" placeholder="e.g. Miso glazed chicken thighs"></div>
    <div class="arf-row"><div class="arf-label">URL (optional)</div><input class="arf-input" id="arf-url" placeholder="https://..."></div>
    <div class="arf-row arf-row-2">
      <div><div class="arf-label">Meal type</div>
        <select class="arf-select" id="arf-type">
          <option value="breakfast">Breakfast</option>
          <option value="lunch">Lunch</option>
          <option value="dinner" selected>Dinner</option>
        </select>
      </div>
      <div><div class="arf-label">Protein type</div>
        <select class="arf-select" id="arf-ptype">
          <option value="chicken">Chicken</option>
          <option value="salmon">Salmon</option>
          <option value="shrimp">Shrimp</option>
          <option value="veg">Plant-based</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="arf-row arf-row-2">
      <div><div class="arf-label">Protein</div><input class="arf-input" id="arf-protein" placeholder="e.g. ~35g"></div>
      <div><div class="arf-label">Fiber</div><input class="arf-input" id="arf-fiber" placeholder="e.g. ~6g"></div>
    </div>
    <div class="arf-row">
      <div class="arf-label">Notes</div>
      <input class="arf-input" id="arf-note" placeholder="e.g. 30 min, sheet pan">
    </div>
    <div class="arf-row">
      <div class="arf-label">Lunch type</div>
      <select class="arf-select" id="arf-prep">
        <option value="false">Cook at lunch / fresh</option>
        <option value="true">Prepped ahead (reheats well)</option>
      </select>
    </div>
    <div class="arf-note">💡 Paste a URL and ask Claude in the project chat to fill in the details for you — then copy the result back here.</div>
    <div class="arf-actions">
      <button class="arf-btn secondary" onclick="toggleAddRecipeForm()">Cancel</button>
      <button class="arf-btn primary" onclick="saveCustomRecipe()">Save recipe</button>
    </div>
  </div>`;
}

function saveCustomRecipe(){
  const name=document.getElementById('arf-name').value.trim();
  if(!name) return;
  const id='cu_'+Date.now();
  const recipe={
    id,name,
    url:document.getElementById('arf-url').value.trim()||'#',
    type:document.getElementById('arf-type').value,
    ptype:document.getElementById('arf-ptype').value,
    protein:document.getElementById('arf-protein').value.trim()||'—',
    fiber:document.getElementById('arf-fiber').value.trim()||'—',
    note:document.getElementById('arf-note').value.trim()||'',
    prep:document.getElementById('arf-prep').value==='true',
    isCustom:true,
    ingredients:[]
  };
  customRecipes.push(recipe);save();
  showAddRecipeForm=false;renderAddRecipeForm();
  renderRecipes();
}

function deleteCustomRecipe(id){
  customRecipes=customRecipes.filter(r=>r.id!==id);save();renderRecipes();
}

function renderRecipes(){
  renderAddRecipeForm();
  const allMeals=getAllMeals();
  const filtered=Object.values(allMeals).filter(m=>{
    if(recipeFilter==='all') return true;
    if(recipeFilter==='custom') return m.isCustom;
    return m.type===recipeFilter;
  });
  const typeColors={breakfast:'background:var(--cream2);color:var(--text2)',lunch_prep:'background:var(--green-light);color:var(--green)',lunch_cook:'background:var(--amber-light);color:var(--amber)',dinner_salmon:'background:var(--red-light);color:var(--red)',dinner_shrimp:'background:var(--blue-light);color:var(--blue)',dinner_chicken:'background:var(--amber-light);color:var(--amber)',custom:'background:var(--teal-light);color:var(--teal)'};
  function getTagStyle(m){
    if(m.isCustom) return typeColors.custom;
    if(m.type==='breakfast') return typeColors.breakfast;
    if(m.type==='lunch') return m.prep?typeColors.lunch_prep:typeColors.lunch_cook;
    if(m.ptype==='salmon') return typeColors.dinner_salmon;
    if(m.ptype==='shrimp') return typeColors.dinner_shrimp;
    return typeColors.dinner_chicken;
  }
  function getTagLabel(m){
    if(m.type==='breakfast') return 'Breakfast';
    if(m.type==='lunch') return m.prep?'Lunch · prepped':'Lunch · cook';
    return 'Dinner · '+(m.ptype||'');
  }
  document.getElementById('recipe-cards').innerHTML=filtered.map(m=>`
    <div class="recipe-card">
      <div class="rc-top">
        <div class="rc-icon ${getIconCls(m)}">${getEmoji(m)}</div>
        <div class="rc-body">
          <div class="rc-name">${m.name}</div>
          <div class="rc-tags">
            <span class="rc-tag" style="${getTagStyle(m)}">${getTagLabel(m)}</span>
            ${m.isCustom?'<span class="rc-tag" style="background:var(--teal-light);color:var(--teal)">my recipe</span>':''}
          </div>
          <div class="rc-meta">${m.protein||''} protein${m.fiber?' · '+m.fiber+' fiber':''} · ${m.note||''}</div>
        </div>
      </div>
      <div class="rc-actions">
        ${m.url&&m.url!=='#'?`<a class="rc-link" href="${m.url}" target="_blank">Open recipe ↗</a>`:'<span style="flex:1"></span>'}
        ${m.isCustom?`<button class="rc-delete" onclick="deleteCustomRecipe('${m.id}')">Remove</button>`:''}
      </div>
    </div>`).join('');
}

// ─── RENDER ALL ──────────────────────────────────────────────────
function renderAll(){
  renderHome();
  renderPlanList();
  renderCalendar();
  renderGrocery();
  renderRecipes();
}
initPlanIfNeeded();
renderAll();
</script>
